<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSCXAU - Gold & Oil Trading Platform</title>
  <meta name="description"
    content="BSCXAU - Nền tảng giao dịch vàng và dầu thô (Gold & Oil) chuyên nghiệp, dark interface, price-focused." />

  <!-- Preconnect to external domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Preload critical fonts -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  </noscript>

  <!-- Preload critical images -->
  <link rel="preload" href="/images/logo2.webp" as="image" type="image/webp" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/images/logo2.webp" />

  <!-- Theme color for mobile browsers -->
  <meta name="theme-color" content="#0a0a0b" />

  <!-- Critical CSS for above-the-fold content -->
  <style>
    /* Prevent FOUC and layout shift */
    html {
      background: #000000;
      color: #fafafa;
    }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root {
      min-height: 100vh;
      background: #000000;
    }

    /* Loading skeleton */
    .loading-skeleton {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #000000;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(245, 158, 11, 0.3);
      border-top: 3px solid #f59e0b;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- Loading skeleton shown while JS loads -->
    <div class="loading-skeleton">
      <div class="loading-spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>

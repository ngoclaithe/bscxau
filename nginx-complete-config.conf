# =====================================================
# BSCXAU - Complete Nginx Configuration
# Frontend: appbscxau.vanquyenhair.name.vn (port 3032)
# Backend API: bscxau.vanquyenhair.name.vn (port 3031)
# =====================================================

# ===== FRONTEND SERVER - Serve Static Files =====
server {
    listen 443 ssl http2;
    server_name appbscxau.vanquyenhair.name.vn;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/bscxau.vanquyenhair.name.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bscxau.vanquyenhair.name.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Root directory - Vite build output
    root /home/bscxau/fe/dist;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        # SPA routing - serve index.html for all routes
        try_files $uri $uri/ /index.html;

        # Cache busting for assets
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API calls should NOT be cached
    location /api/ {
        # This should not reach here as it's on different domain (bscxau.vanquyenhair.name.vn)
        # But just in case, allow it
        proxy_pass https://bscxau.vanquyenhair.name.vn;
    }
}

# ===== BACKEND API SERVER =====
server {
    listen 443 ssl http2;
    server_name bscxau.vanquyenhair.name.vn;

    # Tăng giới hạn upload file
    client_max_body_size 50M;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/bscxau.vanquyenhair.name.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bscxau.vanquyenhair.name.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ===== API Proxy =====
    location /api/ {
        proxy_pass http://127.0.0.1:3031;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookie support - CRITICAL for same-domain cookies
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / /;
    }

    # ===== Socket.io =====
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3031/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Socket timeouts
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Cookie support
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / /;
    }

    # ===== Static Uploads =====
    location /uploads/ {
        alias /home/bscxau/be/uploads/;
        try_files $uri =404;

        # Cache settings
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
    }
}

# ===== HTTP REDIRECT to HTTPS =====
server {
    listen 80;
    server_name appbscxau.vanquyenhair.name.vn bscxau.vanquyenhair.name.vn;
    return 301 https://$server_name$request_uri;
}
